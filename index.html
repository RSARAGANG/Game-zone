<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Push Mandiri</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        .btn-notif {
            background-color: #e040fb;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            width: 100%;
            max-width: 300px;
            display: block;
            margin: 50px auto;
        }
        .btn-notif:disabled {
            background-color: #6c757d;
        }
    </style>
</head>
<body>

    <button id="btnNotif" class="btn-notif">Aktifkan Notifikasi</button>

    <script>
        // Kunci Public VAPID Anda sudah dimasukkan di sini
        const VAPID_PUBLIC_KEY = "BCb4yzOBbW5fCRKhtYuv5k4foDOcJJ89rwedSJm8JIlq5X29yMpNrxtS33nTrtliMYazq8d-zCLvU6yYxrvMwu4"; 

        const tombol = document.getElementById('btnNotif');

        // Daftarkan service worker secara otomatis
        if ('serviceWorker' in navigator && 'PushManager' in window) {
            navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker aktif!'))
            .catch(err => console.error('Service Worker gagal:', err));
        }

        tombol.addEventListener('click', function() {
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    langgananPush();
                } else {
                    alert('Izin notifikasi ditolak.');
                }
            });
        });

        function langgananPush() {
            navigator.serviceWorker.ready.then(reg => {
                return reg.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
                });
            })
            .then(subscription => {
                // TOKEN TUJUAN HP ANDA AKAN MUNCUL DI SINI
                console.log('Alamat HP Anda:', JSON.stringify(subscription));
                alert("Berhasil terdaftar! Data 'subscription' muncul di console log browser.");
                
                tombol.innerText = "Sudah Aktif";
                tombol.disabled = true;
            })
            .catch(err => {
                console.error('Gagal berlangganan push:', err);
                alert('Gagal mengambil token push. Pastikan website sudah menggunakan HTTPS.');
            });
        }

        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }
    </script>
</body>
</html>
